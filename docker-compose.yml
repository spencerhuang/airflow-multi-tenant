version: '3.8'

x-airflow-common: &airflow-common
  image: apache/airflow:3.0.6-python3.11
  entrypoint: ["/opt/airflow/entrypoint-secrets.sh"]
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:-airflow}@postgres-airflow/${POSTGRES_DB:-airflow}
    # Fernet key loaded from Docker secret via entrypoint-secrets.sh
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Airflow 3: FAB auth manager replaces legacy auth backends
    AIRFLOW__CORE__AUTH_MANAGER: 'airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW_WEBSERVER_SECRET_KEY:-airflow-secret-key-change-in-production}'
    AIRFLOW__API__SECRET_KEY: '${AIRFLOW_API_SECRET_KEY:-airflow-secret-key-change-in-production}'
    AIRFLOW__CORE__INTERNAL_API_SECRET_KEY: '${AIRFLOW_INTERNAL_API_SECRET_KEY:-airflow-internal-api-secret-key}'
    AIRFLOW__API_AUTH__JWT_SECRET: '${AIRFLOW_JWT_SECRET:-airflow-jwt-secret-change-in-production}'
    # Airflow 3: Execution API URL required for task SDK communication
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    # Airflow 3: Bundle refresh interval (seconds) for dag-processor to detect new DAG files
    AIRFLOW__DAG_PROCESSOR__REFRESH_INTERVAL: '30'
    PYTHONPATH: /opt/airflow
    _PIP_ADDITIONAL_REQUIREMENTS: 'boto3 pymongo pymysql apache-airflow-providers-fab redis>=5.0.0'
    CONTROL_PLANE_DB_URL: 'mysql+pymysql://${MYSQL_USER:-control_plane}:${MYSQL_PASSWORD:-control_plane}@mysql:3306/${MYSQL_DATABASE:-control_plane}'
    # Airflow internal API (for dispatcher tasks that self-trigger DAGs)
    AIRFLOW_INTERNAL_API_URL: 'http://airflow-apiserver:8080/api/v2'
    AIRFLOW_USERNAME: '${AIRFLOW_USERNAME:-airflow}'
    AIRFLOW_PASSWORD: '${AIRFLOW_PASSWORD:-airflow}'
    # Redis (transient credential vault)
    REDIS_HOST: redis
    REDIS_PORT: '6379'
    REDIS_PASSWORD: '${REDIS_PASSWORD:-changeme_redis}'
  secrets:
    - fernet_key
    - redis_password
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config:/opt/airflow/config
    - ./connectors:/opt/airflow/connectors
    - ./packages/shared_models/shared_models:/opt/airflow/shared_models
    - ./packages/shared_utils/shared_utils:/opt/airflow/shared_utils
    - ./docker/entrypoint-secrets.sh:/opt/airflow/entrypoint-secrets.sh:ro
    - airflow-logs:/opt/airflow/logs
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres-airflow:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # MySQL Database for Control Plane
  mysql:
    image: mysql:8.0
    container_name: control-plane-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-control_plane}
      MYSQL_USER: ${MYSQL_USER:-control_plane}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-control_plane}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL Database for Airflow
  postgres-airflow:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-airflow-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "airflow" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-root}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-test_database}
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
      - ./docker/mongodb-init.js:/docker-entrypoint-initdb.d/mongodb-init.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (transient credential vault for Airflow tasks)
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme_redis}"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  # Kafka (for CDC)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/amd64
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
          # This command always returns exit code 0 (success)
          test: ["CMD", "true"]
          interval: 5s
          retries: 1
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ./docker/kafka-create-topics.sh:/docker/kafka-create-topics.sh:ro
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 | grep ApiVersion
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Kafka Connect (for Debezium CDC)
  kafka-connect:
    build:
      context: .
      dockerfile: docker/Dockerfile.kafka-connect
    platform: linux/amd64
    container_name: kafka-connect
    mem_limit: 1536m
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: debezium-cluster
      KAFKA_HEAP_OPTS: "-Xmx768m -Xms256m"
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      ENABLE_DEBEZIUM_SCRIPTING: "true"
      # Distributed tracing — custom interceptor injects W3C traceparent
      # headers into every Kafka message produced by Debezium CDC.
      # Zero OTEL SDK dependencies — just generates trace_id + span_id.
      CONNECT_PRODUCER_INTERCEPTOR_CLASSES: io.debezium.tracing.TraceparentInterceptor
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/connectors" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Kafka UI (for monitoring Kafka topics, messages, consumer groups)
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    depends_on:
      - kafka
      - kafka-connect
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: debezium
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
      DYNAMIC_CONFIG_ENABLED: "true"
    restart: always

  # Debezium UI (for managing CDC connectors)
  debezium-ui:
    image: debezium/debezium-ui:2.5
    platform: linux/amd64
    container_name: debezium-ui
    depends_on:
      - kafka-connect
    ports:
      - "8088:8080"
    environment:
      KAFKA_CONNECT_URIS: http://kafka-connect:8083
    restart: always

  # One-shot service to register Debezium CDC connector
  debezium-register:
    image: python:3.11-slim
    container_name: debezium-register
    depends_on:
      kafka-connect:
        condition: service_healthy
    working_dir: /app
    environment:
      # Use in-cluster address for Kafka Connect
      KAFKA_CONNECT_URL: http://kafka-connect:8083
    volumes:
      - .:/app
    entrypoint: [ "sh", "-c", "pip install requests -q && python debezium/register_connector.py --force" ]
    restart: "on-failure"

  # Airflow API Server (replaces webserver in Airflow 3)
  airflow-apiserver:
    <<: *airflow-common
    container_name: airflow-apiserver
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/api/v2/version" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow Scheduler
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8974/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow DAG Processor (new in Airflow 3 - handles DAG parsing)
  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # Airflow Init (runs migrations)
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        # Load secrets from Docker secrets files
        if [ -f /run/secrets/fernet_key ]; then
          export AIRFLOW__CORE__FERNET_KEY=$(cat /run/secrets/fernet_key)
        fi
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID}:0" /sources/{logs,dags,plugins}
        /entrypoint airflow db migrate
        airflow users create \
          --username ${AIRFLOW_USERNAME:-airflow} \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password ${AIRFLOW_PASSWORD:-airflow} || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ./airflow:/sources

  # Control Plane Service (stateless REST API — no Kafka dependency)
  control-plane:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    container_name: control-plane-service
    command: >
      sh -c "cd control_plane &&
             python -m alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-control_plane}:${MYSQL_PASSWORD:-control_plane}@mysql:3306/${MYSQL_DATABASE:-control_plane}
      AIRFLOW_API_URL: http://airflow-apiserver:8080/api/v2
      AIRFLOW_USERNAME: '${AIRFLOW_USERNAME:-airflow}'
      AIRFLOW_PASSWORD: '${AIRFLOW_PASSWORD:-airflow}'
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    volumes:
      - ./control_plane:/app/control_plane
      - ./connectors:/app/connectors
      - ./packages/shared_models/shared_models:/app/shared_models
      - ./packages/shared_utils/shared_utils:/app/shared_utils

  # Kafka CDC Consumer Service (standalone stream processor)
  kafka-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.kafka-consumer
    container_name: kafka-consumer-service
    command: >
      uvicorn kafka_consumer.app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-control_plane}:${MYSQL_PASSWORD:-control_plane}@mysql:3306/${MYSQL_DATABASE:-control_plane}
      AIRFLOW_API_URL: http://airflow-apiserver:8080/api/v2
      AIRFLOW_USERNAME: '${AIRFLOW_USERNAME:-airflow}'
      AIRFLOW_PASSWORD: '${AIRFLOW_PASSWORD:-airflow}'
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./kafka_consumer:/app/kafka_consumer
      - ./packages/shared_models/shared_models:/app/shared_models
      - ./packages/shared_utils/shared_utils:/app/shared_utils

secrets:
  fernet_key:
    file: ./docker/secrets/fernet_key
  redis_password:
    file: ./docker/secrets/redis_password

volumes:
  mysql-data:
  postgres-airflow-data:
  mongodb-data:
  minio-data:
  redis-data:
  airflow-logs:
