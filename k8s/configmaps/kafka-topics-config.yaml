---
# Kafka Topics Configuration
# This ConfigMap contains the script to create Kafka topics including DLQ

apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-topics-config
  namespace: airflow
  labels:
    app: kafka
    component: topics
data:
  create-topics.sh: |
    #!/bin/bash
    # Script to create Kafka topics including Dead Letter Queue

    set -e

    # Kafka connection details
    KAFKA_BROKER="${KAFKA_BROKER:-kafka:9092}"
    REPLICATION_FACTOR="${REPLICATION_FACTOR:-1}"
    PARTITIONS="${PARTITIONS:-3}"

    echo "Waiting for Kafka to be ready..."
    # Wait for Kafka to be available
    max_retries=30
    retry=0
    while ! kafka-broker-api-versions --bootstrap-server $KAFKA_BROKER > /dev/null 2>&1; do
        retry=$((retry+1))
        if [ $retry -gt $max_retries ]; then
            echo "Kafka broker not available after $max_retries retries"
            exit 1
        fi
        echo "Waiting for Kafka broker... ($retry/$max_retries)"
        sleep 2
    done

    echo "Kafka is ready. Creating topics..."

    # Create CDC events topic
    kafka-topics --create \
        --bootstrap-server $KAFKA_BROKER \
        --topic cdc.integration.events \
        --partitions $PARTITIONS \
        --replication-factor $REPLICATION_FACTOR \
        --config retention.ms=604800000 \
        --config cleanup.policy=delete \
        --if-not-exists

    echo "✓ Created topic: cdc.integration.events"

    # Create Dead Letter Queue topic
    kafka-topics --create \
        --bootstrap-server $KAFKA_BROKER \
        --topic cdc.integration.events.dlq \
        --partitions $PARTITIONS \
        --replication-factor $REPLICATION_FACTOR \
        --config retention.ms=2592000000 \
        --config cleanup.policy=delete \
        --if-not-exists

    echo "✓ Created topic: cdc.integration.events.dlq"

    # Create test CDC topic (for testing)
    kafka-topics --create \
        --bootstrap-server $KAFKA_BROKER \
        --topic test.cdc.integration.events \
        --partitions $PARTITIONS \
        --replication-factor $REPLICATION_FACTOR \
        --config retention.ms=86400000 \
        --config cleanup.policy=delete \
        --if-not-exists

    echo "✓ Created topic: test.cdc.integration.events"

    # List all topics
    echo ""
    echo "All Kafka topics:"
    kafka-topics --list --bootstrap-server $KAFKA_BROKER

    echo ""
    echo "✅ Kafka topics created successfully!"
    echo ""
    echo "Topic details:"
    echo "  - cdc.integration.events (retention: 7 days)"
    echo "  - cdc.integration.events.dlq (retention: 30 days)"
    echo "  - test.cdc.integration.events (retention: 1 day)"

---
# Kubernetes Job to create Kafka topics
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-topics-creator
  namespace: airflow
  labels:
    app: kafka
    component: topics-creator
spec:
  template:
    metadata:
      labels:
        app: kafka
        component: topics-creator
    spec:
      restartPolicy: OnFailure
      containers:
        - name: kafka-topics-creator
          image: confluentinc/cp-kafka:latest
          command: ["/bin/bash", "/scripts/create-topics.sh"]
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: REPLICATION_FACTOR
              value: "1"
            - name: PARTITIONS
              value: "3"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: kafka-topics-config
            defaultMode: 0755
