---
# Airflow Worker Deployment
# This is an example showing how to mount ConfigMaps as environment variables.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-worker
  namespace: airflow
  labels:
    app: airflow
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airflow
      component: worker
  template:
    metadata:
      labels:
        app: airflow
        component: worker
    spec:
      containers:
        - name: worker
          image: airflow-multi-tenant:latest
          imagePullPolicy: IfNotPresent
          command:
            - airflow
            - celery
            - worker
          env:
            - name: PYTHONPATH
              value: "/opt/airflow:/opt/airflow/plugins:/opt/airflow/config"
            # Redis password from Secret — used by $(REDIS_PASSWORD) below
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infra-secrets
                  key: redis_password
            # Celery broker via Redis Sentinel (auto-failover)
            - name: AIRFLOW__CELERY__BROKER_URL
              value: "sentinel://:$(REDIS_PASSWORD)@redis-sentinel:26379/0"
          envFrom:
            # Mount all variables from airflow-config ConfigMap
            - configMapRef:
                name: airflow-config
            # Mount all variables from airflow-env ConfigMap
            - configMapRef:
                name: airflow-env
            # Mount shared configuration
            - configMapRef:
                name: shared-config
            # Mount secrets (for database passwords, etc.)
            - secretRef:
                name: airflow-secrets
                optional: true
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: plugins
              mountPath: /opt/airflow/plugins
            - name: config
              mountPath: /opt/airflow/config
            - name: logs
              mountPath: /opt/airflow/logs
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "airflow jobs check --job-type CeleryExecutor --hostname $(hostname)"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "airflow jobs check --job-type CeleryExecutor --hostname $(hostname)"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: dags
          persistentVolumeClaim:
            claimName: airflow-dags
        - name: plugins
          persistentVolumeClaim:
            claimName: airflow-plugins
        - name: config
          persistentVolumeClaim:
            claimName: airflow-config-pvc
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs
      restartPolicy: Always

---
# KEDA ScaledObject for Worker Autoscaling
# This automatically scales workers based on task queue depth.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: airflow-worker-scaler
  namespace: airflow
spec:
  scaleTargetRef:
    name: airflow-worker
    kind: Deployment
  pollingInterval: 30  # Check every 30 seconds
  cooldownPeriod: 300  # Wait 5 minutes before scaling down
  minReplicaCount: 2   # Always keep 2 workers minimum
  maxReplicaCount: 50  # Scale up to 50 workers maximum
  triggers:
    # Reactive: scale based on actual Airflow task queue depth
    - type: postgresql
      metadata:
        connectionFromEnv: POSTGRES_CONNECTION_STRING
        query: >
          SELECT COUNT(*)
          FROM task_instance
          WHERE state IN ('queued', 'scheduled')
        targetQueryValue: "10"  # 10 queued tasks per worker
    # Proactive: scale based on scheduled integrations due in the next 24h.
    # Excludes on_demand (triggered by CDC, not predictable).
    # Each integration creates ~4 task instances, so 5 integrations ≈ 20 tasks.
    # KEDA uses the MAX of all triggers, so workers ramp up before tasks are queued.
    - type: mysql
      metadata:
        connectionFromEnv: MYSQL_CONNECTION_STRING
        query: >
          SELECT COUNT(*)
          FROM integrations
          WHERE usr_sch_status = 'active'
            AND schedule_type != 'on_demand'
            AND utc_next_run BETWEEN NOW() AND DATE_ADD(NOW(), INTERVAL 24 HOUR)
        targetQueryValue: "5"  # 1 worker per ~5 upcoming integrations

---
# PodDisruptionBudget for Worker Availability
# Ensures at least 1 worker stays available during voluntary disruptions
# (node drains, cluster upgrades, rollouts).

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: airflow-worker-pdb
  namespace: airflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: airflow
      component: worker

# ---
