---
# Control Plane Service Deployment
# This is an example showing how to mount ConfigMaps as environment variables.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: airflow
  labels:
    app: control-plane
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: control-plane
      component: api
  template:
    metadata:
      labels:
        app: control-plane
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: control-plane
          image: control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Python path for imports
            - name: PYTHONPATH
              value: "/app"
          envFrom:
            # Mount all variables from control-plane-config ConfigMap
            - configMapRef:
                name: control-plane-config
            # Mount shared configuration
            - configMapRef:
                name: shared-config
            # Mount secrets
            - secretRef:
                name: control-plane-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always

---
# Control Plane Service

apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: airflow
  labels:
    app: control-plane
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: control-plane
    component: api

---
# Control Plane HPA

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: control-plane-hpa
  namespace: airflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: control-plane
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 15
